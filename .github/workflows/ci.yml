name: CI

on:
  push:
    branches: [main, 'fix/**', 'feat/**', 'release/**']
  pull_request:
    branches: [main, 'fix/**', 'feat/**', 'release/**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE22: true
      APP_MODE: demo
      VITE_APP_MODE: demo
      DATABASE_URL: mongodb://localhost:27017/academiaflow
      JWT_SECRET: ci_test_jwt_secret_key_32chars_long
      REFRESH_TOKEN_SECRET: ci_test_refresh_secret_32chars_long

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Install pnpm
        uses: pnpm/action-setup@v4.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4.2.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Install System Dependencies (poppler-utils for PDF parsing)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      # Non-blocking audit: visibility-only in Phase A1.
      # Baseline 0 documented 13 vulnerabilities (3 critical, 2 high).
      # Escalation to blocking gate deferred until remediation phase.
      - name: Security Audit (non-blocking)
        run: pnpm audit --audit-level=moderate 2>&1 || true
        continue-on-error: true

      - name: Build Shared Types
        run: pnpm --filter @academiaflow/shared build

      - name: Lint
        run: pnpm lint

      - name: Test (includes Security Tests)
        run: pnpm test

      - name: Build
        run: pnpm build

      # Phase A2: Complexity observation (threshold 15, non-blocking).
      # Baseline 0 found 9 functions above CC=10, max CC=26.
      # Runs as separate step to avoid conflict with --max-warnings 0.
      - name: Complexity Report (non-blocking)
        run: |
          echo "=== Complexity Report (functions with CC > 15) ==="
          cd apps/api && npx eslint src/ --rule 'complexity: [warn, 15]' --format compact 2>&1 | grep "complexity" || echo "  API: No violations"
          cd ../web && npx eslint . --ext ts,tsx --rule 'complexity: [warn, 15]' --format compact 2>&1 | grep "complexity" || echo "  Web: No violations"
          cd ../../packages/shared && npx eslint src/ --rule 'complexity: [warn, 15]' --format compact 2>&1 | grep "complexity" || echo "  Shared: No violations"
          echo "=== End Complexity Report ==="
        continue-on-error: true

      # Phase A2: File size report (info-only, non-blocking).
      # Baseline 0 found 2 files > 400 LOC.
      - name: File Size Report (non-blocking)
        run: |
          echo "=== Files exceeding 400 LOC budget (excluding tests) ==="
          find apps/ packages/ -name '*.ts' -o -name '*.tsx' | grep -v node_modules | grep -v dist | grep -v '.test.' | grep -v '.spec.' | xargs wc -l 2>/dev/null | awk '$1 > 400 && !/total$/ {printf "  %s LOC — %s\n", $1, $2}' | sort -rn || echo "  None found"
          echo "=== End File Size Report ==="
        continue-on-error: true

      # Phase B1: Architecture governance (info-only, non-blocking).
      # Baseline 0 found 0 cycles.
      # Runs dependency-cruiser to monitor architectural drift (shared/apps boundaries).
      - name: Architecture Governance Report (non-blocking)
        run: |
          echo "=== Dependency Cruiser Report ==="
          npx depcruise apps/api/src apps/web/src packages/shared/src || true
          echo "=== End Dependency Cruiser Report ==="
        continue-on-error: true

      - name: Seed Database
        run: pnpm --filter @academiaflow/api seed
        env:
          DATABASE_URL: mongodb://localhost:27017/academiaflow

      - name: Validate Seed Integrity
        run: pnpm validate-seed
        env:
          DATABASE_URL: mongodb://localhost:27017/academiaflow

      - name: Docker Build Validation (API)
        run: docker build -t academiaflow-api:ci-check -f apps/api/Dockerfile .

      - name: Docker Build Validation (Web)
        run: docker build -t academiaflow-web:ci-check -f apps/web/Dockerfile .

