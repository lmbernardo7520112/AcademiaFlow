name: CI

on:
  push:
    branches: [main, 'fix/**', 'feat/**', 'release/**']
  pull_request:
    branches: [main, 'fix/**', 'feat/**', 'release/**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE22: true
      APP_MODE: demo
      VITE_APP_MODE: demo
      DATABASE_URL: mongodb://localhost:27017/academiaflow
      JWT_SECRET: ci_test_jwt_secret_key_32chars_long
      REFRESH_TOKEN_SECRET: ci_test_refresh_secret_32chars_long

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Install pnpm
        uses: pnpm/action-setup@v4.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4.2.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Shared Types
        run: pnpm --filter @academiaflow/shared build

      - name: Lint
        run: pnpm lint

      - name: Test (includes Security Tests)
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Seed Database
        run: pnpm --filter @academiaflow/api seed
        env:
          DATABASE_URL: mongodb://localhost:27017/academiaflow

      - name: Validate Seed Integrity
        run: pnpm validate-seed
        env:
          DATABASE_URL: mongodb://localhost:27017/academiaflow

      - name: Docker Build Validation (API)
        run: docker build -t academiaflow-api:ci-check -f apps/api/Dockerfile .

      - name: Docker Build Validation (Web)
        run: docker build -t academiaflow-web:ci-check -f apps/web/Dockerfile .

