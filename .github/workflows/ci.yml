name: CI

on:
  push:
    branches: [main, 'fix/**']
  pull_request:
    branches: [main, 'fix/**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE22: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Install pnpm
        uses: pnpm/action-setup@v4.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4.2.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Shared Types
        run: pnpm --filter @academiaflow/shared build

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Seed Database
        run: pnpm --filter @academiaflow/api seed
        env:
          DATABASE_URL: mongodb://localhost:27017/academiaflow

      - name: Validate Seed Integrity
        run: pnpm validate-seed
        env:
          DATABASE_URL: mongodb://localhost:27017/academiaflow
